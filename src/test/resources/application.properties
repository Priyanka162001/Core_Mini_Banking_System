spring.application.name=Core_Mini_Banking_System-1

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=KEY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway
spring.flyway.enabled=false

# Dummy mail
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Disable Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# JWT
jwt.secret=test-secret-key-minimum-32-chars-long-here
jwt.access-expiry=900000
jwt.refresh-expiry=604800000

spring.main.allow-bean-definition-overriding=true